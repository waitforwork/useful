apiVersion: v1
kind: LimitRange
metadata:
  name: projectx-limits
  namespace: project-x   # Указываем пространство имен
spec:
  limits:
  - type: Container      # Применяем правила только к контейнерам
    min:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "800m"
      memory: "1Gi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "200m"
      memory: "256Mi"
